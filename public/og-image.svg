<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <rect width="1200" height="630" fill="#1c1917"/>

  <!-- Subtle grid -->
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#292524" stroke-width="0.5"/>
    </pattern>
  </defs>
  <rect width="1200" height="630" fill="url(#grid)"/>

  <!-- DNA helix decoration -->
  <g opacity="0.15">
    <path d="M900 50C950 100 1050 100 1100 50M900 130C960 170 1040 170 1100 130M900 210C950 170 1050 170 1100 210M900 290C960 250 1040 250 1100 290M900 370C950 330 1050 330 1100 370M900 450C960 410 1040 410 1100 450M900 530C950 490 1050 490 1100 530" stroke="#a8a29e" stroke-width="3" fill="none" stroke-linecap="round"/>
    <circle cx="900" cy="50" r="6" fill="#78716c"/>
    <circle cx="1100" cy="50" r="6" fill="#78716c"/>
    <circle cx="900" cy="130" r="6" fill="#78716c"/>
    <circle cx="1100" cy="130" r="6" fill="#78716c"/>
    <circle cx="900" cy="210" r="6" fill="#78716c"/>
    <circle cx="1100" cy="210" r="6" fill="#78716c"/>
    <circle cx="900" cy="290" r="6" fill="#78716c"/>
    <circle cx="1100" cy="290" r="6" fill="#78716c"/>
    <circle cx="900" cy="370" r="6" fill="#78716c"/>
    <circle cx="1100" cy="370" r="6" fill="#78716c"/>
    <circle cx="900" cy="450" r="6" fill="#78716c"/>
    <circle cx="1100" cy="450" r="6" fill="#78716c"/>
    <circle cx="900" cy="530" r="6" fill="#78716c"/>
    <circle cx="1100" cy="530" r="6" fill="#78716c"/>
  </g>

  <!-- Sequence decoration -->
  <text x="80" y="580" font-family="monospace" font-size="14" fill="#292524" letter-spacing="2">
    ATGCTGACCGCCAACGGCATTAAAGTGAACTTCAAGATCCGCCACAACATCGAGGACGGCAGCGTGCAGCTCGCCGAC
  </text>

  <!-- Main content -->
  <text x="80" y="200" font-family="system-ui, -apple-system, sans-serif" font-size="72" font-weight="700" fill="#fafaf9" letter-spacing="-2">
    CodonForge
  </text>

  <text x="80" y="260" font-family="system-ui, -apple-system, sans-serif" font-size="28" fill="#a8a29e">
    Free Codon Optimization Tool
  </text>

  <!-- Feature pills -->
  <g font-family="system-ui, -apple-system, sans-serif" font-size="16" fill="#78716c">
    <rect x="80" y="310" width="140" height="36" rx="18" fill="#292524"/>
    <text x="110" y="334" fill="#a8a29e">15 Organisms</text>

    <rect x="240" y="310" width="200" height="36" rx="18" fill="#292524"/>
    <text x="260" y="334" fill="#a8a29e">Restriction Avoidance</text>

    <rect x="460" y="310" width="150" height="36" rx="18" fill="#292524"/>
    <text x="485" y="334" fill="#a8a29e">AI Analysis</text>

    <rect x="630" y="310" width="170" height="36" rx="18" fill="#292524"/>
    <text x="650" y="334" fill="#a8a29e">FASTA / GenBank</text>
  </g>

  <!-- Metrics -->
  <g font-family="monospace" fill="#57534e">
    <text x="80" y="420" font-size="14">CAI optimization  ·  GC content control  ·  RNA secondary structure avoidance</text>
    <text x="80" y="450" font-size="14">Codon harmony  ·  Homopolymer removal  ·  Batch processing  ·  UTR addition</text>
  </g>

  <!-- Version -->
  <text x="80" y="520" font-family="monospace" font-size="12" fill="#44403c">v1.0  ·  No signup required  ·  Browser-based  ·  Open source</text>
</svg>
